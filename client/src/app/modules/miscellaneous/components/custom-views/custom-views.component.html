<button mat-menu-item (click)="saveCurrentView()">Sauvegarder la vue actuelle</button>
<mat-divider></mat-divider>
@for (kanbanView of kanbanViews; track kanbanView; let index = $index) {
  <div mat-menu-item (click)="selectView(kanbanView)"
    class="pointer">
    <mat-icon (click)="deleteView(index, $event)">delete</mat-icon>
    {{kanbanView.label}}
    @if (currentView && currentView.label==kanbanView.label) {
      <mat-icon>check</mat-icon>
    }
  </div>
}
