@if (value && value.length>0) {
  <div class="div-wrapper ">
    <mat-chip-set style="display: inline;">
      @if (statusType==1) {
        <mat-chip selected class="ok-status">{{value}}</mat-chip>
      }
      @if (statusType==2) {
        <mat-chip selected class="warn-status">{{value}}</mat-chip>
      }
      @if (statusType==3) {
        <mat-chip selected class="ko-status">{{value}}</mat-chip>
      }
      @if (statusType==4) {
        <mat-chip selected class="standard-status">{{value}}</mat-chip>
      }
    </mat-chip-set>
  </div>
}
