<mat-form-field class="full-width" [formGroup]="form!">
  <mat-label>{{label}}</mat-label>
  <input #affaireInput matInput placeholder="Récupérer une affaire existante" [matAutocomplete]="autoCompleteAffaire"
    [formControlName]="propertyName" autocomplete="do-not-autofill">
    @if (!isDisabled && model!=undefined) {
      <mat-icon color="accent" matSuffix (click)="clearField()" class="pointer">
        close
      </mat-icon>
    }
    @if (isDisplayPreviewShortcut) {
      <mat-icon color="accent" matTooltip="Afficher l'affaire" matTooltipShowDelay="1000" matSuffix
        (click)="clickOnPreviewIcon()" class="pointer ">
        visibility
      </mat-icon>
    }
    <mat-autocomplete autoActiveFirstOption #autoCompleteAffaire="matAutocomplete" [displayWith]="displayAffaire"
      (optionSelected)='optionSelected($event.option.value)'>
      @for (affaire of filteredTypes; track affaire) {
        <mat-option [value]="affaire">
          {{displayLabel(affaire)}}
        </mat-option>
      }
    </mat-autocomplete>
  </mat-form-field>
