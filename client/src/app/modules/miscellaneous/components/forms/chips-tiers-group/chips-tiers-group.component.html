<mat-form-field class="full-width" [formGroup]="form!">
  <mat-label>{{label}}</mat-label>
  <mat-chip-grid #chipListTiersGroup>
    @for (tiersGroup of model; track tiersGroup) {
      <mat-chip-row (removed)="removeElement(tiersGroup)">
        {{tiersGroup.label}}
        @if (!isDisabled) {
          <button matChipRemove>
            <mat-icon>cancel</mat-icon>
          </button>
        }
      </mat-chip-row>
    }
    <input matInput placeholder="Choisir un groupe" [formControlName]="propertyName" #tiersGroupInput
      [matChipInputFor]="chipListTiersGroup" [matChipInputSeparatorKeyCodes]="SEPARATOR_KEY_CODES"
      [disabled]="isDisabled" [matAutocomplete]="autoComplete">
    </mat-chip-grid>
    <mat-autocomplete autoActiveFirstOption #autoComplete="matAutocomplete" [displayWith]="displayLabel"
      (optionSelected)="addTiersGroup($event)">
      @for (tiersGroup of filteredTiersGroups | async; track tiersGroup) {
        <mat-option [value]="tiersGroup">
          {{tiersGroup.label}}
        </mat-option>
      }
    </mat-autocomplete>
  </mat-form-field>
