<mat-form-field class="full-width" [formGroup]="form!">
  <mat-label>{{label}}</mat-label>
  <mat-chip-grid #chipList [formControlName]="propertyName">
    @for (chip of model; track chip) {
      <mat-chip-row (removed)="removeElement(chip)">
        {{getValueFromObject(chip)}}
        @if (!isDisabled) {
          <button matChipRemove>
            <mat-icon>cancel</mat-icon>
          </button>
        }
        @if (isDisabled) {
          <mat-icon color="accent" matChipRemove class="always-clickable"
          (click)="prepareMail(chip)">mail</mat-icon>
        }
      </mat-chip-row>
    }
    <input [placeholder]="isDisabled?'':'Saisir un mail et appuyer sur Entrée'" #chipInput [matChipInputFor]="chipList"
      [disabled]="isDisabled" [matChipInputSeparatorKeyCodes]="SEPARATOR_KEY_CODES"
      (matChipInputTokenEnd)="addElement($event)">
    </mat-chip-grid>
  </mat-form-field>
