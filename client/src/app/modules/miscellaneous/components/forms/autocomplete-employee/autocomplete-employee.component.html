<mat-form-field class="full-width" [formGroup]="form!">
  <mat-label>{{label}}</mat-label>
  <div class="select-with-avatar">
    <avatar class="avatar-select" [employee]="model" [size]="20">
    </avatar>
    <input type="text" matInput [formControlName]="propertyName" [matAutocomplete]="matAutocomplete">
  </div>
  @if (!isDisabled) {
    <mat-icon color="accent" matSuffix matTooltip="Me choisir" (click)="chooseMyself()"
      class="pointer ">
      account_circle
    </mat-icon>
  }
  @if (!isDisabled && model!=undefined) {
    <mat-icon color="accent" matSuffix (click)="clearField()" class="pointer">
      close
    </mat-icon>
  }
  <mat-autocomplete autoActiveFirstOption #matAutocomplete="matAutocomplete" [displayWith]="displayLabel"
    (optionSelected)='optionSelected($event.option.value)'>
    @for (employee of filteredTypes | async; track employee) {
      <mat-option [value]="employee">
        <div class="select-with-avatar">
          <avatar class="avatar-select" [employee]="employee" [size]="20">
          </avatar>
          {{displayLabel(employee)}}
        </div>
      </mat-option>
    }
  </mat-autocomplete>
</mat-form-field>
