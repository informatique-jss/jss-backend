<mat-form-field class="full-width" [formGroup]="form!">
  @if (label && label.length>0) {
    <mat-label>{{label}}</mat-label>
  }
  <input matInput [maxlength]="maxLength+''" [minlength]="minLength+''" [formControlName]="propertyName"
    [placeholder]="label" (blur)="blurForm()" [type]="type=='number'?'text':type" [step]="step"
    (change)="parse($event)">
    @if (hint && hint.length>0) {
      <mat-hint>
      {{hint}}</mat-hint>
    }
    @if (displayClearField && !isDisabled && model!=undefined) {
      <mat-icon color="accent" matSuffix (click)="clearField();$event.stopPropagation() "
        class="pointer">
        close
      </mat-icon>
    }
  </mat-form-field>
