<form [formGroup]="form!">
  @if (label && label !='') {
    <mat-label>{{label}}</mat-label>
  }
  <mat-radio-group class="radio-group-column" [formControlName]="propertyName">
    @for (type of types; track type) {
      <mat-radio-button [value]="type" [checked]=" model && model.code == type.code">
        {{type.label}}
      </mat-radio-button>
    }
  </mat-radio-group>
</form>
