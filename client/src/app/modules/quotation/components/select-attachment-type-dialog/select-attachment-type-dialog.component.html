<h1 mat-dialog-title>Choix du type de document</h1>
<div mat-dialog-content>
  <p>Choisissez le type de document à ajouter ci-dessous :</p>
  <table class="full-width">
    <tr>
      <td>
        <autocomplete-attachment-type [(model)]="selectedAttachmentType" [form]="attachmentTypeForm"
          propertyName="selectedAttachmentType" [isMandatory]="true" [isDisabled]="false"
          label="Type de pièce"></autocomplete-attachment-type>
      </td>
    </tr>
  </table>
</div>
<div mat-dialog-actions align="end">
  <button mat-raised-button color="accent" (click)="closeDialog()">Annuler</button>
  <button mat-raised-button color="warn" (click)="validateDocumentType()">Valider</button>
</div>
