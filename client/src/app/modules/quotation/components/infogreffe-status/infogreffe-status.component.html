@if (formalitesInfogreffe) {
  <div>
    <mat-tab-group animationDuration="0ms">
      @for (formaliteInfogreffe of formalitesInfogreffe; track formaliteInfogreffe; let index = $index) {
        <mat-tab
          [label]="getFormaliteLabel(formaliteInfogreffe)">
          <mat-vertical-stepper [linear]="false" #stepper animationDuration="500">
            @for (evenement of formaliteInfogreffe.evenements; track evenement) {
              <mat-step>
                <ng-template matStepLabel> <span> {{getFieldLabel(evenement.codeEtat)}} le {{evenement.createdDate
                |date:'dd/MM/yyyy HH:mm'}} </span>
              </ng-template>
            </mat-step>
          }
        </mat-vertical-stepper>
      </mat-tab>
    }
  </mat-tab-group>
</div>
}
