<mat-tab-group animationDuration="0ms">
  <mat-tab label="Choisir une affaire existante">
    <table class="full-width">
      <tr>
        <td>
          <autocomplete-affaire [(model)]="selectedAffaire" [form]="affaireForm" propertyName="affaire"
          label="Récupérer une affaire existante" (onOptionSelected)="fillAffaire($event)"></autocomplete-affaire>
        </td>
      </tr>
    </table>
    @if (selectedAffaire) {
      <add-affaire [affaire]="selectedAffaire" [editMode]="true"></add-affaire>
    }
  </mat-tab>
  @if (!selectedAffaire) {
    <mat-tab label="Créer une affaire">
      @if (affaire) {
        <form [formGroup]="affaireForm">
          <div class="full-width">
            <add-affaire [isLabelAffaire]="isLabelAffaire" [(affaire)]="affaire" [editMode]="true"></add-affaire>
          </div>
        </form>
      }
    </mat-tab>
  }
</mat-tab-group>
<div mat-dialog-actions align="end">
  @if (selectedAffaire==null) {
    <button mat-raised-button color="accent" (click)="saveAffaire()">Créer
    l'affaire</button>
  }
  @if (selectedAffaire!=null) {
    <button mat-raised-button color="accent" (click)="saveAffaire()">Choisir
    l'affaire</button>
  }
  <button mat-raised-button color="warn" (click)="closeDialog()">Annuler</button>
</div>
