<div>
  @if (!canDisplayExtendentMonitoring()) {
    <monitoring-summary></monitoring-summary>
  }
  @if (canDisplayExtendentMonitoring()) {
    <mat-tab-group animationDuration="0ms" (selectedTabChange)="onTabChange($event)"
      [(selectedIndex)]="selectedTabIndex">
      <mat-tab label="Synthèse">
        <monitoring-summary (selectBatchSetting)="selectBatchSetting($event)"></monitoring-summary>
      </mat-tab>
      @if (batchSettingsSelected) {
        <mat-tab [label]="'Détails - '+batchSettingsSelected.label">
          <monitoring-details [selectedBatchSetting]="batchSettingsSelected"></monitoring-details>
        </mat-tab>
      }
      @if (canDisplayExtendentMonitoring()) {
        <mat-tab label="Noeuds">
          <ng-template matTabContent>
            <monitoring-nodes></monitoring-nodes>
          </ng-template>
        </mat-tab>
      }
    </mat-tab-group>
  }
</div>
