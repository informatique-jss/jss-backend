<div class="mat-elevation-z2 form-div">
  <div class=" full-width">
    <table class="full-width table-fixed-layout">
      <tr>
        <td>
          <generic-datepicker label="Date de début" [form]="" propertyName="startDate" [isMandatory]="false"
            [isDisabled]="false"></generic-datepicker>
        </td>
        <td>
          <generic-datepicker label="Date de fin" [form]="" propertyName="endDate" [isMandatory]="false"
            [isDisabled]="false"></generic-datepicker>
        </td>
        <td class="fab-td-button">
          <button mat-mini-fab color="warn" matTooltip="Rechercher" (click)="true" class="add-button">
            <mat-icon>search</mat-icon>
          </button>
        </td>
      </tr>
    </table>
  </div>
</div>
<button matTooltip="Importer le fichier d'extrait de facturation INPI" mat-fab color="accent" class="fab-button"
  (click)="importInpiInvoicingExtractFile()" >
  <mat-icon>upload</mat-icon>
</button>
