<div class="full-width row" [formGroup]="form!">
  <div class="select-wrapper">
    @if (isDisplayLabel && label && label.length > 0) {
      <label [for]="'fl-text'+uniqueId"
      class="form-label">{{label}}</label>
    }
    <select class="form-control" [formControlName]="propertyName" [id]="'fl-text'+uniqueId" [required]="isMandatory"
      [compareWith]="compareWithId" (blur)="blurForm()" [disabled]="isDisabled">
      @for (type of types; track type) {
        <option [ngValue]="type">
          {{ displayLabel(type) }}
        </option>
      }
    </select>
    <i class="bi-chevron-down chevron btn-search"></i>
  </div>
</div>
