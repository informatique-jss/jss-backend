<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">

<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <style>
        @page {
            size: A4;
            margin: 0;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 595pt;
            height: 841pt;
            overflow: hidden;
        }

        .page {
            position: relative;
            width: 595pt;
            height: 841pt;
            overflow: hidden;
            page-break-after: avoid;
            page-break-before: avoid;
        }


        .label {
            position: absolute;
            display: block;
            height: 20px;
            line-height: 20px;
            overflow: hidden;
            white-space: normal;
            word-break: break-word;
            font-size: 12px;
            white-space: pre-line;
        }

        * {
            box-sizing: border-box;
            -moz-box-sizing: border-box;
            -webkit-box-sizing: border-box;
        }
    </style>
</head>

<body>

    <div class="page">

        <!-- recipient -->
        <span class="label" style=" left:140px; top:140px; width:300px; height:60px; ">
            <span th:each="line : ${recipientLabel}" th:text="${line + ' '}">
            </span>
        </span>

        <span style="left:140px; top:200px; width:300px; height:40px" th:text="${recipientAddress}" class="label">
        </span>


        <!-- recipient -->
        <span class="label" style=" left:460px; top:140px; width:300px; height:60px; ">
            <span th:each="line : ${recipientLabel}" th:text="${line + ' '}">
            </span>
        </span>
        <span style="left:460px; top:200px;width:300px; height:40px " th:text="${recipientAddress}" class="label">
        </span>


        <!-- recipient -->
        <span class="label" style=" left:220px; top:520px; width:300px; height:60px; ">
            <span th:each="line : ${recipientLabel}" th:text="${line + ' '}">
            </span>
        </span>
        <span style="left:220px; top:580px; width:300px; height:40px" th:text="${recipientAddress}" class="label">
        </span>


        <!-- sender -->
        <span style="left:220px; top:660px; width:300px;" th:text="${senderName}" class="label"></span>
        <span style="left:220px; top:680px; width:300px;" th:text="${senderStreet}" class="label"></span>
        <span style="left:220px; top:700px; width:300px;" th:text="${senderPostalAndCity}" class="label"></span>


        <!-- recipient -->
        <span class="label" style=" left:220px; top:860px; width:300px; height:60px; ">
            <span th:each="line : ${recipientLabel}" th:text="${line + ' '}">
            </span>
        </span>
        <span style="left:220px; top:920px;width:300px; height:40px" th:text="${recipientAddress}" class="label">
        </span>

        <!-- sender -->
        <span style="left:220px; top:1000px; width:300px; " th:text="${senderName}" class="label"></span>
        <span style="left:220px; top:1020px; width:300px;" th:text="${senderStreet}" class="label"></span>
        <span style="left:220px; top:1040px; width:300px;" th:text="${senderPostalAndCity}" class="label"></span>


        <!-- customer order reference -->
        <span style="left:25px; top:1040px; width:160px; height:45px" th:text="${customerOrderReference}" class="label">
        </span>

    </div>

</body>

</html>
