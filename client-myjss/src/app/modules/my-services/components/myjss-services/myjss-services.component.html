<section class="pt-5 mt-5 container">
  <!-- Breadcrumb -->
  <nav aria-label="breadcrumb">
    <ol class="pt-lg-5 pb-lg-4 pb-2 breadcrumb">
      <li class="breadcrumb-item"><a routerLink="/">Accueil</a></li>
      <li class="breadcrumb-item"><a>Nos services</a></li>
      <li class="breadcrumb-item">
        @if (selectedTab) {
          <span>{{ selectedTab.label }}</span>
        }
      </li>
    </ol>
  </nav>

  <!-- Nav tabs -->
  <ul class="nav nav-tabs" role="tablist">
    @for (item of myJssServicesItems; track item) {
      <li class="nav-item">
        @if (item === selectedTab) {
          <span class="nav-link active">
            <i class="fi-home me-2"></i>
            {{ item.label }}
          </span>
        }
        @if (item !== selectedTab) {
          <a class="nav-link" [routerLink]="item.route">
            <i class="fi-home me-2"></i>
            {{ item.label }}
          </a>
        }
      </li>
    }
  </ul>
</section>

<!-- Content Section -->
<div class="tab-content">
  <div>
    <div class="tab-pane">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
