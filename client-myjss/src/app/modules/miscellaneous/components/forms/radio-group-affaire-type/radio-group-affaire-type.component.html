<form [formGroup]="form!" class="form-check row d-flex flex-row">
  @for (type of types; track type) {
    <div class="col pe-5 col-auto">
      <input class="form-check-input" type="radio" [id]="type.code" [formControlName]="propertyName" [value]="type"
        [required]="isMandatory" [checked]="model && model.id === type.id">
        <label class="form-check-label" [for]="type.code"> {{type.label}}</label>
      </div>
    }
  </form>
