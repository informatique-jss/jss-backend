@if (form) {
  <div class="full-width row" [formGroup]="form!">
    <div class="select-wrapper position-relative">
      @if (isDisplayLabel && label && label.length > 0) {
        <label [for]="'fl-text'+uniqueId" class="form-label">{{ label
        }}</label>
      }
      <select class="form-select custom-multiselect" [formControlName]="propertyName" [id]="'fl-text'+uniqueId"
        [required]="isMandatory" multiple [compareWith]="compareWithId" (blur)="blurForm()" (focus)="focusForm()"
        [disabled]="isDisabled" [class.is-invalid]="form.get(propertyName)?.invalid && form.get(propertyName)?.touched"
        [class.is-valid]="form.get(propertyName)?.valid && form.get(propertyName)?.touched">
        @for (type of types; track type) {
          <option [ngValue]="type">
            {{ displayLabel(type) }}
          </option>
        }
      </select>
      <i class="ai-chevron-down chevron position-absolute end-0 me-3 mt-2"></i>
    </div>
  </div>
}
