<div class="full-width row align-items-center" [formGroup]="form!">
  <div class="select-wrapper pe-0">
    @if (isDisplayLabel && label && label.length > 0) {
      <label [for]="'fl-text'+uniqueId"
      class="form-label">{{label}}</label>
    }
    <select class="form-control select-custom" [formControlName]="propertyName" [id]="'fl-text'+uniqueId"
      [required]="isMandatory" [compareWith]="compareWithId" (blur)="blurForm()" (focus)="focusForm()"
      [disabled]="isDisabled">
      @for (type of types; track type) {
        <option [ngValue]="type">
          {{ displayLabel(type) }}
        </option>
      }
    </select>
    <i class="ai-chevron-down chevron"></i>
  </div>
</div>
