@if (form) {
  <div class="full-width row" [formGroup]="form!">
    <div class="select-wrapper">
      @if (isDisplayLabel && label && label.length > 0) {
        <label [for]="'fl-text'+uniqueId"
        class="form-label">{{label}}</label>
      }
      <select class="form-control " [formControlName]="propertyName" [id]="'fl-text'+uniqueId" [required]="isMandatory"
        [compareWith]="compareWithId" (blur)="blurForm()" (focus)="focusForm()" [disabled]="isDisabled"
        [class.is-invalid]="form.get(propertyName)?.invalid && form.get(propertyName)?.touched"
        [class.is-valid]="form.get(propertyName)?.valid && form.get(propertyName)?.touched">
        @for (type of types; track type) {
          @if (!type.isDisabled) {
            <option [ngValue]="type">
              {{ displayLabel(type) }}
            </option>
          }
        }
      </select>
      <i class="ai-chevron-down chevron"></i>
    </div>
  </div>
}
